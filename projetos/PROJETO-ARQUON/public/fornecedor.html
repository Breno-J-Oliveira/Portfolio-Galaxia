<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARQON Vault Control | Painel do Fornecedor</title>

    <!-- Theme loader deve vir antes dos CSS para definir as variáveis -->
    <script src="scripts/config.js"></script>
    <script src="scripts/theme-loader.js"></script>

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <div id="arqon-toast-container"></div>

    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <span class="brand-mark">A</span>
                <div>
                    <strong>ARQON</strong>
                    <small>FORNECEDOR</small>
                </div>
            </div>
            <nav class="admin-nav" id="admin-nav">
                <a href="#" class="nav-link active" data-tab="produtos"><i class="fas fa-gem"></i> Meus Produtos</a>
                <a href="#" class="nav-link" data-tab="mapa"><i class="fas fa-map-marked-alt"></i> Localização</a>
                <a href="#" class="nav-link" data-tab="perfil"><i class="fas fa-user-circle"></i> Perfil</a>
            </nav>
            <div class="admin-sidebar-footer">
                <a href="index.html" class="nav-link subtle" target="_blank"><i class="fas fa-store"></i> Ver Loja</a>
                <a href="#" class="nav-link logout-btn" id="btn-logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <div>
                    <h1 class="admin-page-title" id="page-title">Meus Produtos</h1>
                    <p class="admin-page-subtitle" id="page-subtitle">Gerencie seus artefatos no cofre</p>
                </div>
                <div class="topbar-actions">
                    <span class="admin-user-chip" id="admin-user-chip">Fornecedor</span>
                    <button type="button" class="btn-ghost" id="btn-refresh" title="Atualizar"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>

            <div class="admin-content">
                <!-- PRODUTOS -->
                <section id="tab-produtos" class="tab-content active">
                    <div class="toolbar">
                        <div class="toolbar-left">
                            <input type="search" id="input-busca-produtos" class="search-input" placeholder="Buscar produto...">
                            <select id="filtro-status" class="filter-select">
                                <option value="todos">Todos</option>
                                <option value="1">Disponível</option>
                                <option value="0">Indisponível</option>
                            </select>
                        </div>
                        <div class="toolbar-right">
                            <button type="button" class="btn-gold" id="btn-novo-produto"><i class="fas fa-plus"></i> Novo Produto</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead><tr><th>ID</th><th>Nome</th><th>Marca</th><th>Categoria</th><th>Diária</th><th>Status</th><th>Ações</th></tr></thead>
                            <tbody id="tbody-produtos"></tbody>
                        </table>
                    </div>
                </section>

                <!-- MAPA -->
                <section id="tab-mapa" class="tab-content">
                    <div class="panel-card">
                        <h3><i class="fas fa-map-marked-alt"></i> Sua Localização na Rede ARQON</h3>
                        <div id="mapa-fornecedor" style="margin-top:16px;"></div>
                        <div class="info-grid" style="margin-top:20px;">
                            <div class="info-card"><i class="fas fa-city"></i><h4>Cidade</h4><p id="forn-cidade">—</p></div>
                            <div class="info-card"><i class="fas fa-flag"></i><h4>Estado</h4><p id="forn-estado">—</p></div>
                            <div class="info-card"><i class="fas fa-box"></i><h4>Produtos Ativos</h4><p id="forn-produtos">0</p></div>
                        </div>
                    </div>
                </section>

                <!-- PERFIL -->
                <section id="tab-perfil" class="tab-content">
                    <div class="panel-card" style="max-width:600px;">
                        <h3><i class="fas fa-user-circle"></i> Dados do Fornecedor</h3>
                        <form id="form-perfil" class="config-form" style="margin-top:16px;">
                            <div class="form-grid-2">
                                <div class="form-group"><label>Nome</label><input type="text" id="perfil-nome" class="form-control" disabled></div>
                                <div class="form-group"><label>Email</label><input type="email" id="perfil-email" class="form-control" disabled></div>
                                <div class="form-group"><label>Cidade</label><input type="text" id="perfil-cidade" class="form-control"></div>
                                <div class="form-group"><label>Estado</label><input type="text" id="perfil-estado" class="form-control" maxlength="2"></div>
                            </div>
                            <button type="submit" class="btn-gold" style="margin-top:12px;">Atualizar Localização</button>
                        </form>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modal Produto -->
    <div class="modal-overlay" id="modal-produto">
        <div class="modal-content modal-sm">
            <div class="modal-head">
                <h3 id="modal-produto-titulo"><i class="fas fa-gem" style="color: var(--gold);"></i> Novo Produto</h3>
                <button type="button" class="modal-close" onclick="fecharModalProduto()">&times;</button>
            </div>
            <form id="form-produto">
                <input type="hidden" id="prod-id">
                <div class="modal-body">
                    <div class="form-group"><label>Nome *</label><input type="text" id="prod-nome" class="form-control" required></div>
                    <div class="form-group"><label>Descrição</label><textarea id="prod-descricao" class="form-control" rows="2"></textarea></div>
                    <div class="form-group"><label>Composição</label><input type="text" id="prod-composicao" class="form-control"></div>
                    <div class="form-grid-2">
                        <div class="form-group"><label>Valor Mercado (R$) *</label><input type="number" step="0.01" id="prod-valor-mercado" class="form-control" required></div>
                        <div class="form-group"><label>Valor Diária (R$) *</label><input type="number" step="0.01" id="prod-valor-diaria" class="form-control" required></div>
                    </div>
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label>Status</label>
                            <select id="prod-status" class="form-control">
                                <option value="1">Disponível</option>
                                <option value="0">Indisponível</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Gênero</label>
                            <select id="prod-genero" class="form-control">
                                <option value="unissex">Unissex</option>
                                <option value="masculino">Masculino</option>
                                <option value="feminino">Feminino</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-gold">Salvar</button>
                    <button type="button" class="btn-cancel" onclick="fecharModalProduto()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="scripts/toast.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="scripts/fornecedor.js"></script>
</body>
</html>
