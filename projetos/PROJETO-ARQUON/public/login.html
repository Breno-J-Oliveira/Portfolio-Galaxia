<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARQON - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/login.css">
</head>
<body>

<section class="arqon-auth-section">
    <a href="index.html" class="arqon-btn-back">
        <i class="fa-solid fa-arrow-left"></i>
        <span>VOLTAR AO SITE</span>
    </a>

    <div class="arqon-auth-layout">
        
        <div class="arqon-visual-pane">
            <div class="arqon-visual-overlay"></div>
            <div class="arqon-brand-content">
                <h1 class="arqon-logo">ARQON</h1>
                <p class="arqon-tagline">EXCLUSIVIDADE & ESTILO</p>
            </div>
        </div>

        <div class="arqon-form-pane">
            <div class="arqon-form-container">
                <form id="arqon-auth-form" class="arqon-form" novalidate autocomplete="off">
                    </form>
            </div>
        </div>

    </div>
</section>

<script src="scripts/login.js"></script>
<script src="index.js"></script></body>
</html>
