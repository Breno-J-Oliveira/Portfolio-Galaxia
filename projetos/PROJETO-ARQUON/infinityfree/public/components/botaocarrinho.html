<aside class="arqon-cart-overlay" id="rentCartOverlay">
    <div class="cart-backdrop" id="closeCartBackdrop"></div>
    
    <div class="cart-drawer">
        <header class="cart-header">
            <div class="cart-title-group">
                <span class="tech-label">SECURE SESSION</span>
                <h2 class="cart-title">SEU COFRE</h2>
            </div>
            <button class="btn-close-cart" id="closeCartBtn">✕</button>
        </header>

        <hr class="cart-divider">

        <div class="cart-items-container" id="cartItemsList">
            </div>

        <div class="cart-footer">
            <hr class="cart-divider">
            
            <div class="summary-row">
                <span class="summary-label">SUBTOTAL CUSTÓDIA</span>
                <span class="summary-value" id="cartSubtotal">R$ 0,00</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">TAXA DE HIGIENIZAÇÃO</span>
                <span class="summary-value" id="cartCleaningFee">R$ 0,00</span>
            </div>
            <div class="summary-row deposit-row">
                <span class="summary-label">RETENÇÃO DE CAUÇÃO <span class="info-icon" title="Valor reembolsável pós-devolução segura">i</span></span>
                <span class="summary-value" id="cartSecurityDeposit">R$ 0,00</span>
            </div>
            
            <hr class="cart-divider">
            
            <div class="summary-row total-row">
                <span class="summary-label">APORTE TOTAL ESTIMADO</span>
                <span class="summary-value highlight" id="cartTotal">R$ 0,00</span>
            </div>

            <div class="cart-actions">
                <button class="btn-primary-block checkout-btn" id="btnProceedCheckout">
                    <span class="btn-text">AUTORIZAR ALUGUER</span>
                    <span class="btn-icon">→</span>
                </button>
                <button class="btn-text-gold continue-shopping" id="btnContinueShopping">
                    <span>←</span> CONTINUAR EXPLORANDO
                </button>
            </div>
        </div>
    </div>
</aside>
