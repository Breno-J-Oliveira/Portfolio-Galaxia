<!-- LOADING SCREEN — injetado via fetch() na página da galáxia -->
<div id="loader">
  <canvas id="loader-canvas"></canvas>
  <div class="loader-scan"></div>
  <div class="loader-grid"></div>
  <div class="loader-vignette"></div>

  <div class="loader-corner tl"></div>
  <div class="loader-corner tr"></div>
  <div class="loader-corner bl"></div>
  <div class="loader-corner br"></div>

  <div class="loader-content">
    <div class="loader-eyebrow">Sistema de Navegação v2.0</div>

    <div class="loader-logo-wrap">
      <span class="loader-logo">BRENO <span class="logo-accent">J.</span> OLIVEIRA</span>
      <div class="loader-logo-glitch" aria-hidden="true">
        <span>BRENO J. OLIVEIRA</span>
        <span>BRENO J. OLIVEIRA</span>
      </div>
    </div>

    <div class="loader-role">Backend Developer &amp; Systems Engineer</div>

    <div class="loader-bar-wrap">
      <div class="loader-bar-track">
        <div class="loader-bar" id="loader-bar"></div>
      </div>
      <div class="loader-bar-glow"></div>
    </div>

    <div class="loader-data-row">
      <div class="loader-percent" id="loader-percent">0%</div>
      <div class="loader-status" id="loader-status-msg">Inicializando...</div>
    </div>

    <div class="loader-dots">
      <div class="loader-dot active" id="ldot-0"></div>
      <div class="loader-dot" id="ldot-1"></div>
      <div class="loader-dot" id="ldot-2"></div>
      <div class="loader-dot" id="ldot-3"></div>
      <div class="loader-dot" id="ldot-4"></div>
    </div>
  </div>
</div>
